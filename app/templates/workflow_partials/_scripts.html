      saveWorkflowState();
    });

    printWithoutBillingPrice.addEventListener("change", () => {
      refreshPriceCodeDetection();
      updatePreview();
      saveWorkflowState();
    });

    showPricingFieldsToggle.addEventListener("change", () => {
      setPricingFieldsPreference(showPricingFieldsToggle.checked, true);
      refreshPriceCodeDetection();
      updatePreview();
    });

    regenerateBarcodeButton.addEventListener("click", () => {
      setForceNewBarcode(true);
      fields.barcode.value = "";
      manualBarcodeOverride.checked = false;
      setMode("new_barcode", "Creating new barcode");
      requestGeneratedBarcode(true);
      updatePreview();
      saveWorkflowState();
    });

    form.addEventListener("submit", event => {
      if (!allowFormSubmit) {
        event.preventDefault();
        printFromInlineQuantity();
        return;
      }
      allowFormSubmit = false;
    });
    form.addEventListener("invalid", event => {
      resetPrintSubmissionState();
      const target = event.target;
      if (target && typeof target.focus === "function") {
        window.setTimeout(() => {
          target.focus();
          if (typeof target.select === "function") {
            target.select();
          }
        }, 0);
      }
    }, true);
    form.addEventListener("keydown", event => {
      if (event.key !== "Tab") {
        return;
      }
      const entries = visibleEntryFields();
      const active = document.activeElement;
      const index = entries.indexOf(active);
      if (index === -1) {
        return;
      }
      event.preventDefault();
      const nextIndex = event.shiftKey
        ? (index - 1 + entries.length) % entries.length
        : (index + 1) % entries.length;
      const next = entries[nextIndex];
      next.focus();
      if (typeof next.select === "function") {
        next.select();
      }
    });

    printButton.addEventListener("click", () => {
      if (!["new_barcode", "update_existing"].includes(workflowMode.value)) {
        setMode("print", existingVariantId.value ? "Updating selected item" : "New item");
      }
      printFromInlineQuantity();
    });

    printQuantityInput.addEventListener("click", () => printQuantityInput.select());
    printQuantityInput.addEventListener("input", () => {
      printQuantityInput.value = printQuantityInput.value.replace(/\D/g, "");
      fields.copies.value = printQuantityInput.value || "1";
      saveWorkflowState();
    });
    printQuantityInput.addEventListener("keydown", event => {
      if (printSubmissionPending) {
        event.preventDefault();
        return;
      }
      if (event.key === "Enter") {
        event.preventDefault();
        printFromInlineQuantity();
      }
    });

    document.addEventListener("keydown", event => {
      if (printSubmissionPending) {
        event.preventDefault();
        return;
      }
      if (event.key === "Control" && !event.repeat) {
        const now = Date.now();
        if (window.__shopbridgeLastCtrlAt && now - window.__shopbridgeLastCtrlAt <= 550) {
          event.preventDefault();
          window.__shopbridgeLastCtrlAt = 0;
          printFromInlineQuantity();
          return;
        }
        window.__shopbridgeLastCtrlAt = now;
        return;
      }
      if (event.ctrlKey && event.key === "Enter") {
        event.preventDefault();
        printFromInlineQuantity();
      } else if (event.ctrlKey && event.key.toLowerCase() === "p") {
        event.preventDefault();
        printFromInlineQuantity();
      }
    });

    window.addEventListener("pageshow", () => {
      resetPrintSubmissionState();
    });

    document.querySelectorAll(".load-variant").forEach(button => {
      button.addEventListener("click", () => {
        const variant = variants.find(item => String(item.id) === String(button.dataset.variantId));
        populateVariant(variant, false);
      });
    });

    document.querySelectorAll(".tag-button").forEach(button => {
      button.addEventListener("click", () => {
        const option = Array.from(templateSelect.options).find(item => item.value === button.dataset.templateId);
        if (option) {
          option.hidden = false;
          templateSelect.value = button.dataset.templateId;
          closeVariantMenu();
          closeBillingItemMenu();
          applyTemplateFields({resetCustomValues: true});
          saveWorkflowState();
        }
      });
    });

    const restoredWorkflowState = restoreWorkflowState();
    setPricingFieldsPreference(pricingFieldsPreferenceVisible, false);
    captureBasePlaceholders();
    applyCategory(templateSelect.value, {resetCustomValues: false});
    if (restoredWorkflowState) {
      try {
        setCustomFieldValues(JSON.parse(extraFieldValuesInput.value || "{}"));
      } catch (error) {
        setCustomFieldValues({});
      }
      refreshPriceCodeDetection();
    }
    if (initialVariantId && !hasPrintError) {
      const initialVariant = variants.find(item => String(item.id) === String(initialVariantId));
      if (initialVariant) {
        populateVariant(initialVariant, initialDuplicate);
      }
    } else if (hasPrintError && initialVariantId) {
      const failedPrintVariant = variants.find(item => String(item.id) === String(initialVariantId));
      if (failedPrintVariant) {
        restoreVariantForRetry(failedPrintVariant);
      }
    } else if (initialBarcode) {
      fields.barcode.value = initialBarcode;
      manualBarcodeOverride.checked = true;
      refreshBarcodeControls();
      updatePreview();
      saveWorkflowState();
    } else if (restoredWorkflowState && existingVariantId.value) {
      const restoredVariant = variants.find(item => String(item.id) === String(existingVariantId.value));
      if (restoredVariant) {
        selectedVariantSnapshot = {...restoredVariant};
      }
      refreshBarcodeControls();
      updatePreview();
    }
    if (pageParams.has("printed") || (!initialVariantId && !initialBarcode)) {
      focusBillingItem();
    }
    window.addEventListener("beforeunload", saveWorkflowState);
  </script>
