<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ShopBridge{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/new-stock">ShopBridge</a>
      <nav class="nav">
        {% set path = request.url.path %}
        <a class="{{ 'active' if path.startswith('/new-stock') else '' }}" href="/new-stock">New Stock / Print Labels</a>
        <a class="{{ 'active' if path.startswith('/scan') else '' }}" href="/scan">Scan / Lookup</a>
        <a class="{{ 'active' if path.startswith('/variants') else '' }}" href="/variants">All Items</a>
        <a class="{{ 'active' if path.startswith('/templates') else '' }}" href="/templates">Templates</a>
        <a class="{{ 'active' if path.startswith('/settings') or path.startswith('/templates') or path.startswith('/families') or path.startswith('/variants') or path.startswith('/print-jobs') else '' }}" href="/settings">Settings</a>
      </nav>
    </header>
    <main class="page">
      {% if message %}
        <div class="notice">{{ message }}</div>
      {% endif %}
      {% if warning %}
        <div class="warning">{{ warning }}</div>
      {% endif %}
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
