<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ShopBridge{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/new-stock">ShopBridge</a>
      <nav class="nav">
        <a href="/new-stock">New Stock / Print Labels</a>
        <a href="/recent-prints">Recent Prints</a>
        <a href="/reports">Reports</a>
        <a href="/settings">Settings</a>
        <a href="/tally">Tally Tools</a>
      </nav>
    </header>
    <main class="page">
      {% if message %}
        <div class="notice">{{ message }}</div>
      {% endif %}
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
